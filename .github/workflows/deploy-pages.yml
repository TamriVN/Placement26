name: Deploy mapping report

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pushes a static site to the gh-pages branch (no deploy-pages API required).
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p public
          cp output/vnvc_mapping_report.html public/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
